		<!-- <h1>{{ page.title }}</h1> -->
		<h1 class='tag'>Blog Posts by Date</h1>
		<ul class="posts">

		  {% for post in site.posts %}
		    <li><span>{{ post.date | date: "%Y-%m-%d" }}</span> &nbsp; <a href="{{ post.url }}" title="{{ post.title }}">{{ post.title }}</a></li>
		  {% endfor %}
		    
		</ul>
